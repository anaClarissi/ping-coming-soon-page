<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="keywords" content="html, css, javaScript">
  <meta name="author" content="Ana Clarissi">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Ping coming soon page</title>

  <link rel="stylesheet" href="src/css/style.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body>

  <main class="container">

    <header class="header">

      <section class="logo">

        <img src="src/images/logo.svg" alt="Ping Logo" class="logo_img">

      </section>

    </header>

    <section class="content">

      <h1 class="content_title">We are launching soon!</h1>

      <h2 class="content_subtitle">Subscribe and get notified</h2>

      <form id="notify_form" action="#">
        
        <input type="email" name="email" id="email" placeholder="Your email address...">
        
        <button id="notify_btn" type="submit">Notify Me</button>

      </form>

      <article class="content_dashboard">

        <img src="src/images/illustration-dashboard.png" alt="Dashboard" class="content_dashboard__img">

      </article>

    </section>

    <footer class="footer">
      
      <nav class="footer_nav">

        <ul class="footer_links">

          <li class="footer_link__items">

            <i class="fa-brands fa-facebook-f"></i>

          </li>

          <li class="footer_link__items">

            <i class="fa-brands fa-twitter"></i>

          </li>

          <li class="footer_link__items">

            <i class="fa-brands fa-instagram"></i>

          </li>

        </ul>

      </nav>

      <p>&copy; Copyright Ping. All rights reserved.</p>

    </footer>

  </main>

  <script src="src/js/script.js"></script>

</body>
</html>
